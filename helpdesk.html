<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="a helpdesk for appointments of CWA">
    <meta name="keywords" content="helpdesk, appointments, CWA">
    <meta name="author" content="NyanPhyoAung">
    <title>CWA Help Desk Appointment</title>
</head>
<body>
    <!--logo as link to redirect-->
    <a href="https://www.swinburne.edu.au/" target="_blank"><img src="logo.png" alt="swinburne_logo" title="https://www.swinburne.edu.au/"></a>
    <h1>CWA Help Desk Appointment</h1>
    <p>The Help Desk is located in ATC620. Open 10:30 to 19:00 Monday to Friday</p>
    <p>Check Blackboard for when CWA tutors will be there</p>

    <!--form start here-->
    <form method="post" action="https://mercury.swin.edu.au/it000000/formtest.php">

        <!--1st field for student id,first name, last name, all required and patterned-->
        <fieldset>
            <legend>Student details</legend>
            <label for="student_id">Student ID</label>
            <input type="text" id="student_id" name="student_id" pattern="[0-9]{7,10}" placeholder="Enter Student ID" required><br><br>
            <label for="Gname">Given Name</label>
            <input type="text" id="Gname" name="given_name" pattern="[a-zA-Z]{1,15}" placeholder="Enter First Name" required>
            <label for="Fname">Family Name</label>
            <input type="text" id="Fname" name="family_name" pattern="[a-zA-Z]{1,15}" placeholder="Enter Family Name" required>
        </fieldset>

        <!--2nd field for subject(same 'name') and tutor, both required -->
        <fieldset>
            <legend>Your unit</legend>
            <input type="radio" id="1st" name="subject" value="COS10004" required>
            <label for="1st">COS10004</label>
            <input type="radio" id="2nd" name="subject" value="COS10009">
            <label for="2nd">COS10009</label>
            <input type="radio" id="3rd" name="subject" value="COS10026">
            <label for="3rd">COS10026</label>

            <br>
            <label for="tutor">Your Tutor</label>
            <select id="tutor" name="tutor" required>
                <option value="">Please Select</option>
                <option value="CHEE HUEI ANG">CHEE HUEI ANG</option>
                <option value="SITI HAWA MOHAMED SAID">SITI HAWA MOHAMED SAID</option>
                <option value="PAWANI T.RASARATNAM">PAWANI T.RASARATNAM</option>
                <option value="JOHN DOE">JOHN DOE</option>
            </select>
        </fieldset>

        <!--3rd field for the issue the student have, skills array hold the skills HTML checked,-->
        <fieldset>
            <legend>Issue</legend>
            <label for="html">HTML</label>
            <input type="checkbox" id="html" name="skills[]" value="HTML" checked>

            <label for="css">CSS</label>
            <input type="checkbox" id="css" name="skills[]" value="CSS">

            <label for="javascript">JavaScript</label>
            <input type="checkbox" id="javascript" name="skills[]" value="JavaScript">
            
            <label for="php">PHP</label>
            <input type="checkbox" id="php" name="skills[]" value="PHP">

            <label for="mysql">MySQL</label>
            <input type="checkbox" id="mysql" name="skills[]" value="MySQL">
            
            <br><br>
            <label for="description">Description of Issue</label><br>
            <textarea id="description" name="description_of_issue" rows="4" cols="50" placeholder="Write description of your problem here..." required></textarea>
        </fieldset>

        <!--using type "date" and "time"-->
        <!--
        <fieldset>
            <legend>Preferred Date/Time</legend>
            <label for="Date1">Date</label>
            <input type="date" id="Date1" name="date1" required><br><br>
            <label for="Time1">Time</label>
            <input type="time" id="Time1" name="time1" required>
        </fieldset>
        -->
        
        <!--4th field for date and time both required-->
        <fieldset>
            <legend>Preferred Date/Time</legend>
            <label for="Date">Date</label>
            <input type="text" id="Date" name="date" pattern="(0?[1-9]|[12][0-9]|3[01])/(0?[1-9]|1[0-2])/[0-9]{2}" placeholder="dd/mm/yy" required><br><br>
            <label for="Time">Time</label>
            <input type="text" id="Time" name="time" pattern="([01]?[0-9]|2[0-3]):[0-5][0-9]" placeholder="00:00" required>
        </fieldset>

        <br>
        <input type="submit" value="Book">
        <input type="reset" value="Reset Form">
    </form>

</body>
</html>
